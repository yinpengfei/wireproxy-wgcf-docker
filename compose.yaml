services:
  warp-socks:
    build:
      context: .
      args:
        WGCF_VERSION: v2.2.31
        WIREPROXY_VERSION: v1.1.3
    image: local/wireproxy-wgcf:1.0
    container_name: wireproxy-wgcf
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${SOCKS_PORT:-1080}:1080"
    environment:
      WG_MTU: "${WG_MTU:-1280}"
      WG_ENDPOINT: "${WG_ENDPOINT:-}"
      SOCKS_USERNAME: "${SOCKS_USERNAME:-}"
      SOCKS_PASSWORD: "${SOCKS_PASSWORD:-}"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 1080"]
      interval: 30s
      timeout: 12s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
